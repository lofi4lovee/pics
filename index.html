
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;700&family=Kalam:wght@400;700&family=Khand:wght@400;700&family=Lato:wght@400;700&family=Merriweather:wght@400;700&family=Montserrat:wght@400;700&family=Mukta:wght@400;700&family=Noto+Sans+Devanagari:wght@400;700&family=Nunito:wght@400;700&family=Open+Sans:wght@400;700&family=Oswald:wght@400;700&family=Playfair+Display:wght@400;700&family=Poppins:wght@400;700&family=Rajdhani:wght@400;700&family=Raleway:wght@400;700&family=Roboto:wght@400;700&family=Rozha+One&family=Teko:wght@400;700&family=Ubuntu:wght@400;700&family=Yatra+One&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 font-sans">
    <div class="flex flex-row h-screen">
        
        <!-- Sidebar Controls -->
        <aside class="w-1/2 flex-shrink-0 lg:w-[400px] bg-white border-r border-gray-200 flex flex-col h-full overflow-y-auto">
            <div class="p-6">
                <h1 class="text-2xl font-bold mb-6 text-gray-900">Template Generator</h1>
                
                <!-- Size Selector -->
                <div class="mb-8">
                    <h2 class="text-sm font-semibold text-gray-700 uppercase tracking-wider mb-3">Select Size</h2>
                    <div class="flex gap-4">
                        <label class="flex items-center cursor-pointer">
                            <input type="radio" name="size" value="1080x1920" class="peer sr-only" checked>
                            <div class="px-4 py-2 border-2 border-gray-200 rounded-lg peer-checked:border-blue-500 peer-checked:bg-blue-50 transition-all font-medium text-gray-600 peer-checked:text-blue-700 flex items-center gap-2">
                                <svg class="w-4 h-4 hidden peer-checked:block text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                                </svg>
                                1080 x 1920
                            </div>
                        </label>
                        <label class="flex items-center cursor-pointer">
                            <input type="radio" name="size" value="1080x1080" class="peer sr-only">
                            <div class="px-4 py-2 border-2 border-gray-200 rounded-lg peer-checked:border-blue-500 peer-checked:bg-blue-50 transition-all font-medium text-gray-600 peer-checked:text-blue-700 flex items-center gap-2">
                                <svg class="w-4 h-4 hidden peer-checked:block text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                                </svg>
                                1080 x 1080
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Template Selector -->
                <div class="mb-8">
                    <h2 class="text-sm font-semibold text-gray-700 uppercase tracking-wider mb-3">Select Template</h2>
                    <div class="grid grid-cols-2 lg:grid-cols-3 gap-3" id="template-grid">
                        <!-- Templates will be injected here via JS -->
                    </div>
                </div>

                <!-- Dynamic Inputs -->
                <div class="mb-8" id="input-container">
                    <h2 class="text-sm font-semibold text-gray-700 uppercase tracking-wider mb-3">Content Inputs</h2>
                    <div id="dynamic-fields" class="space-y-4">
                        <!-- Input fields will be injected here via JS -->
                    </div>
                </div>
            </div>
            
            <div class="mt-auto p-6 border-t border-gray-200 bg-gray-50">
                <button id="download-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-blue-200 transition-all flex justify-center items-center gap-2">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    Download HD Image
                </button>
            </div>
        </aside>

        <!-- Preview Area -->
        <main class="flex-1 bg-gray-100 flex flex-col overflow-hidden relative">
            <div class="h-16 border-b border-gray-200 bg-white flex items-center justify-between px-6 lg:hidden">
                <span class="font-bold text-gray-800">Preview</span>
            </div>
            
            <!-- Canvas Container -->
            <div class="flex-1 p-8 overflow-auto flex items-center justify-center relative bg-gray-50 shadow-inner">
                
                <!-- The actual rendering box -->
                <div id="preview-wrapper" class="relative shadow-2xl transition-all duration-300 origin-center bg-white overflow-hidden" style="width: 1080px; height: 1080px; transform: scale(0.5);">
                    <!-- Template HTML will be injected here -->
                    <div id="render-target" class="w-full h-full relative">
                        <!-- Dynamic content -->
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- Font Selection Modal -->
    <div id="font-modal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-2xl shadow-2xl w-[90%] max-w-2xl max-h-[85vh] flex flex-col overflow-hidden">
            <!-- Modal Header -->
            <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                <h3 class="text-lg font-bold text-gray-800">Choose Font Style</h3>
                <button id="close-font-modal" class="text-gray-400 hover:text-red-500 transition-colors">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            
            <!-- Modal Body (Font List) -->
            <div class="flex-1 overflow-y-auto p-4 bg-gray-50/50">
                <div class="mb-6">
                    <h4 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3 px-2">Hindi / Devanagari Fonts</h4>
                    <div id="hindi-font-list" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <!-- Populated via JS -->
                    </div>
                </div>
                <div>
                    <h4 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3 px-2">English Fonts</h4>
                    <div id="english-font-list" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <!-- Populated via JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
